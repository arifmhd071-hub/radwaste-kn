[build]
  publish = "public"

# Redirect semua route ke index.html (SPA behavior)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security & PWA headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-XSS-Protection         = "1; mode=block"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# Cache lama untuk aset statis
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service Worker — jangan di-cache browser
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest — cache pendek
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/manifest+json"
